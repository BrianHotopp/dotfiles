set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g mode-keys emacs
set -g mouse on

# Cross-platform clipboard: macOS pbcopy, then Wayland, then X11.
run-shell 'if command -v pbcopy >/dev/null 2>&1; then \
    tmux set -g @copy_command "pbcopy"; \
  elif command -v wl-copy >/dev/null 2>&1; then \
    tmux set -g @copy_command "wl-copy"; \
  elif command -v xclip >/dev/null 2>&1; then \
    tmux set -g @copy_command "xclip -selection clipboard -in"; \
  else \
    tmux set -g @copy_command "xsel --clipboard --input"; \
  fi'

bind -T copy-mode M-w send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind -T copy-mode C-w send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_command}"
bind P paste-buffer

# OSC 52 clipboard passthrough (works over SSH, nested tmux, etc.)
set -s set-clipboard on

# Better color support across terminals
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Plugins (managed by tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Persist sessions across reboots: save pane contents, auto-save every 15
# minutes, and auto-restore the last save when the tmux server starts.
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize tpm (must be the last line).
run '~/.tmux/plugins/tpm/tpm'
